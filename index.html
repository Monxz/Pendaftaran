<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Pendaftaran Modern</title>
    <!-- Menggunakan Font Poppins agar terlihat elegan -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* --- STYLING UTAMA (BODY) --- */
        body {
            background-color: #0b1120; /* Dark Blue Background */
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Efek Latar Belakang Partikel (Abstract Nodes) */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(#22d3ee 1px, transparent 1px),
                radial-gradient(#a855f7 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.05;
            z-index: -1;
        }

        /* --- CONTAINER UTAMA --- */
        .main-container {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* --- HEADER & NAV --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
        }

        /* --- TOMBOL DAFTAR (GLOWING) --- */
        .btn-daftar-header {
            background: linear-gradient(135deg, #22d3ee 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
            transition: transform 0.2s, box-shadow 0.3s;
        }

        .btn-daftar-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.7);
        }

        /* --- SECTION MANAGEMENT (Hiding/Showing) --- */
        .section {
            display: none; /* Sembunyikan semua section secara default */
            animation: fadeIn 0.5s ease-in-out;
        }

        .section.active {
            display: block; /* Tampilkan section yang aktif */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TOMBOL KEMBALI (BACK) --- */
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* --- KARTU PILIHAN KATEGORI --- */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .category-card:hover {
            border-color: #22d3ee;
            background: rgba(34, 211, 238, 0.05);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(34, 211, 238, 0.1);
        }

        .category-card.selected {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #22d3ee;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* --- FORM STYLING --- */
        .form-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #22d3ee;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
        }

        .form-column {
            display: none; /* Sembunyikan form spesifik default */
        }

        .form-column.active {
            display: block;
        }

        /* --- TOMBOL KIRIM (SUBMIT) --- */
        .btn-kirim {
            grid-column: 1 / -1; /* Span across full width */
            background: linear-gradient(135deg, #22d3ee 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-kirim:hover {
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.6);
            transform: scale(1.02);
        }

        /* --- TABEL DAFTAR PENDAFTAR --- */
        .list-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .list-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
        }

        .table-container {
            width: 100%;
            overflow-x: auto; /* Responsif horizontal scroll */
            background: rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px; /* Jaga lebar minimum */
        }

        th, td {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        th {
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            color: #e2e8f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .form-container {
                grid-template-columns: 1fr;
            }
            .main-container {
                padding: 20px;
            }
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- HEADER -->
        <header>
            <div class="brand">PlatformKu</div>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Event</a></li>
                <li><a href="#">Pendaftaran</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
            <button class="btn-daftar-header" id="headerDaftarBtn">Daftar</button>
        </header>

        <!-- ========================================= -->
        <!-- SECTION 1: PEMILIHAN KATEGORI (Default Aktif) -->
        <!-- ========================================= -->
        <div id="sectionKategori" class="section active">
            <button class="btn-back"><span>&larr;</span> Kembali</button>
            
            <div class="category-grid">
                <!-- Kartu Daftar Tim -->
                <div class="category-card" id="cardTim">
                    <div class="card-icon">&#128101;</div> <!-- Icon Users -->
                    <div class="card-title">Daftar Tim</div>
                    <div class="card-subtitle">(Min. 3 Orang)</div>
                </div>

                <!-- Kartu Daftar Seorang -->
                <div class="category-card" id="cardSolo">
                    <div class="card-icon">&#128100;</div> <!-- Icon User -->
                    <div class="card-title">Daftar Seorang</div>
                    <div class="card-subtitle">(Individu)</div>
                </div>
            </div>
        </div>

        <!-- ========================================= -->
        <!-- SECTION 2: FORM INPUT (Disembunyikan Awal) -->
        <!-- ========================================= -->
        <div id="sectionForm" class="section">
            <button class="btn-back" id="backToKategori"><span>&larr;</span> Kembali</button>
            
            <form id="registrationForm">
                <div class="form-container">
                    
                    <!-- KOLOM FORM TIM (Aktif jika pilih Tim) -->
                    <div class="form-column" id="formInputsTim">
                        <div class="form-group">
                            <label>Nama Anggota 1</label>
                            <input type="text" name="team_mem1" placeholder="Nama Anggota 1" required disabled>
                        </div>
                        <div class="form-group">
                            <label>Nama Anggota 2</label>
                            <input type="text" name="team_mem2" placeholder="Nama Anggota 2" required disabled>
                        </div>
                        <div class="form-group">
                            <label>Nama Anggota 3</label>
                            <input type="text" name="team_mem3" placeholder="Nama Anggota 3" required disabled>
                        </div>
                    </div>

                    <!-- KOLOM FORM SOLO (Aktif jika pilih Seorang) -->
                    <div class="form-column" id="formInputsSolo">
                        <div class="form-group">
                            <label>Nama Lengkap</label>
                            <input type="text" name="solo_name" placeholder="Nama Lengkap Anda" required disabled>
                        </div>
                    </div>

                    <!-- TOMBOL KIRIM (Glowing) -->
                    <button type="submit" class="btn-kirim">Kirim</button>
                </div>
            </form>
        </div>

        <!-- ========================================= -->
        <!-- SECTION 3: LIST PENDAFTAR (Selalu Terlihat) -->
        <!-- ========================================= -->
        <div class="list-section">
            <div class="list-title">List Pendaftar Terbaru</div>
            <div class="table-container">
                <table id="pendaftarTable">
                    <thead>
                        <tr>
                            <th>Nama / Tim</th>
                            <th>Kategori</th>
                            <th>Tanggal Daftar</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data akan diisi oleh JavaScript -->
                        <!-- Contoh Tampilan Awal -->
                        <tr>
                            <td>Budi (Solo)</td>
                            <td>Seorang</td>
                            <td>20.10.2023</td>
                        </tr>
                        <tr>
                            <td>Tim Garuda (3 Orang)</td>
                            <td>Tim</td>
                            <td>20.10.2023</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- --- JAVASCRIPT --- -->
    <script>
        // --- Deklarasi Elemen ---
        const sectionKategori = document.getElementById('sectionKategori');
        const sectionForm = document.getElementById('sectionForm');
        
        const cardTim = document.getElementById('cardTim');
        const cardSolo = document.getElementById('cardSolo');
        
        const formInputsTim = document.getElementById('formInputsTim');
        const formInputsSolo = document.getElementById('formInputsSolo');
        const registrationForm = document.getElementById('registrationForm');
        
        const backToKategoriBtn = document.getElementById('backToKategori');
        const headerDaftarBtn = document.getElementById('headerDaftarBtn');
        const tableBody = document.querySelector('#pendaftarTable tbody');

        let kategoriTerpilih = ''; // Variabel untuk menyimpan pilihan

        // --- Fungsi Navigasi Section ---
        function showSection(sectionId) {
            // Sembunyikan semua section
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            // Tampilkan section yang dituju
            document.getElementById(sectionId).classList.add('active');
        }

        // --- Event Listeners ---

        // Tombol Daftar di Header (Reset ke Kategori)
        headerDaftarBtn.addEventListener('click', () => {
            showSection('sectionKategori');
            resetCards();
        });

        // Pilih Kategori Tim
        cardTim.addEventListener('click', () => {
            selectKategori('Tim');
        });

        // Pilih Kategori Solo
        cardSolo.addEventListener('click', () => {
            selectKategori('Solo');
        });

        // Tombol Kembali dari Form ke Kategori
        backToKategoriBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Cegah submit form
            showSection('sectionKategori');
            resetForm();
        });

        // Fungsi saat kategori dipilih
        function selectKategori(tipe) {
            resetCards();
            resetForm();
            kategoriTerpilih = tipe;

            if (tipe === 'Tim') {
                cardTim.classList.add('selected');
                formInputsTim.classList.add('active');
                toggleInputs(formInputsTim, true); // Aktifkan input Tim
            } else {
                cardSolo.classList.add('selected');
                formInputsSolo.classList.add('active');
                toggleInputs(formInputsSolo, true); // Aktifkan input Solo
            }

            // Pindah ke section Form
            showSection('sectionForm');
        }

        // Fungsi Reset Tampilan Kartu
        function resetCards() {
            cardTim.classList.remove('selected');
            cardSolo.classList.remove('selected');
            kategoriTerpilih = '';
        }

        // Fungsi Reset Form & Input
        function resetForm() {
            registrationForm.reset();
            formInputsTim.classList.remove('active');
            formInputsSolo.classList.remove('active');
            toggleInputs(formInputsTim, false); // Matikan input Tim
            toggleInputs(formInputsSolo, false); // Matikan input Solo
        }

        // Fungsi Mengaktifkan/Nonaktifkan Input (agar HTML5 validasi bekerja tepat)
        function toggleInputs(container, enable) {
            const inputs = container.querySelectorAll('input');
            inputs.forEach(input => {
                input.disabled = !enable;
            });
        }

        // =========================================
        // --- LOGIKA PENYIMPANAN DATA (LOCALSTORAGE) ---
        // =========================================

        // Fungsi Load Data dari LocalStorage saat halaman dibuka
        function loadData() {
            const storedData = JSON.parse(localStorage.getItem('pendaftarList')) || [];
            
            // Bersihkan tabel (kecuali contoh awal jika ingin)
            tableBody.innerHTML = ''; 

            // Tambahkan data dari storage
            storedData.forEach(pendaftar => {
                addTableRow(pendaftar.namaDisplay, pendaftar.kategori, pendaftar.tanggal);
            });
        }

        // Fungsi Menambah Baris ke Tabel HTML
        function addTableRow(nama, kategori, tanggal) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${nama}</td>
                <td>${kategori}</td>
                <td>${tanggal}</td>
            `;
            tableBody.prepend(row); // Tambah di paling atas
        }

        // Fungsi Menangani Submit Form
        registrationForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Cegah reload halaman

            const formData = new FormData(registrationForm);
            let namaDisplay = '';
            let kategori = '';
            
            const now = new Date();
            const tanggal = `${now.getDate().toString().padStart(2, '0')}.${(now.getMonth() + 1).toString().padStart(2, '0')}.${now.getFullYear()}`;

            if (kategoriTerpilih === 'Tim') {
                const mem1 = formData.get('team_mem1');
                const mem2 = formData.get('team_mem2');
                const mem3 = formData.get('team_mem3');
                namaDisplay = `${mem1} (Tim - Ketua: ${mem1})`;
                kategori = 'Tim';
            } else if (kategoriTerpilih === 'Solo') {
                const soloName = formData.get('solo_name');
                namaDisplay = `${soloName} (Solo)`;
                kategori = 'Seorang';
            }

            if (!namaDisplay) return; // Keamanan jika submit kosong

            // Persiapkan Objek Data
            const pendaftarBaru = { namaDisplay, kategori, tanggal };

            // Simpan ke LocalStorage
            const storedData = JSON.parse(localStorage.getItem('pendaftarList')) || [];
            storedData.push(pendaftarBaru);
            localStorage.setItem('pendaftarList', JSON.stringify(storedData));

            // Update Tabel HTML
            addTableRow(namaDisplay, kategori, tanggal);

            // Selesai: Kembali ke awal dan reset
            alert('Pendaftaran Berhasil Dikirim!');
            showSection('sectionKategori');
            resetCards();
            resetForm();
        });

        // Jalankan Load Data saat pertama kali load halaman
        loadData();

    </script>
</body>
</html>
